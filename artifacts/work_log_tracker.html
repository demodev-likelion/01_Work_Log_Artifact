<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>work log</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#fff;color:#1a1a1a;font-family:'JetBrains Mono','Fira Mono','Courier New',monospace;padding:2rem}
  .wl{max-width:680px;margin:0 auto}
  .wl-title{font-size:15px;font-weight:600;letter-spacing:0.04em;margin-bottom:3px}
  .wl-sub{font-size:11px;color:#888;letter-spacing:0.06em;margin-bottom:1.75rem}
  .date-row{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem}
  .date-label{flex:1;font-size:13px;font-weight:600;letter-spacing:0.03em}
  .nbtn{background:none;border:0.5px solid #ccc;border-radius:8px;padding:5px 11px;cursor:pointer;font-family:inherit;font-size:11px;color:#555;letter-spacing:0.04em;transition:background 0.1s}
  .nbtn:hover{background:#f5f5f5}
  .nbtn.today{color:#1a1a1a;font-weight:600}
  .slot{display:flex;align-items:stretch;border-bottom:0.5px solid #e8e8e8}
  .slot:first-child{border-top:0.5px solid #e8e8e8}
  .slot.hour{border-bottom-color:#d0d0d0}
  .slot.hour .tlabel{color:#555}
  .tlabel{width:56px;flex-shrink:0;padding:14px 0;font-size:11px;color:#aaa;letter-spacing:0.04em;display:flex;align-items:center}
  .scell{flex:1;cursor:pointer;padding:0 12px;transition:background 0.1s;border-left:2px solid transparent;min-height:52px;display:flex;align-items:center}
  .scell:hover{background:#f8f8f8}
  .scell.filled{border-left-color:#ccc}
  .scell.active{background:#f8f8f8}
  .stext{font-size:12px;color:#1a1a1a;line-height:1.6;padding:12px 0;width:100%}
  .stext.empty{color:#ccc}
  .sinput{width:100%;border:none;background:none;font-family:inherit;font-size:12px;color:#1a1a1a;outline:none;resize:none;line-height:1.6;padding:12px 0;letter-spacing:0.02em}
  .sinput::placeholder{color:#ccc}
  .footer{display:flex;align-items:center;justify-content:space-between;margin-top:1.25rem;padding-top:1rem;border-top:0.5px solid #e8e8e8}
  .fstat{font-size:11px;color:#aaa;letter-spacing:0.04em}
  .fstat span{color:#555}
  .saved-msg{font-size:11px;color:#aaa;letter-spacing:0.04em;opacity:0;transition:opacity 0.3s}
  .saved-msg.on{opacity:1}
  .hint{font-size:10px;color:#bbb;letter-spacing:0.04em;margin-top:4px}

  @media (prefers-color-scheme: dark) {
    body{background:#121212;color:#e8e8e8}
    .nbtn{border-color:#333;color:#aaa}
    .nbtn:hover{background:#1e1e1e}
    .nbtn.today{color:#e8e8e8}
    .slot{border-bottom-color:#222}
    .slot:first-child{border-top-color:#222}
    .slot.hour{border-bottom-color:#2e2e2e}
    .slot.hour .tlabel{color:#888}
    .tlabel{color:#444}
    .scell:hover{background:#1a1a1a}
    .scell.filled{border-left-color:#333}
    .scell.active{background:#1a1a1a}
    .stext{color:#e8e8e8}
    .stext.empty{color:#333}
    .sinput{color:#e8e8e8}
    .sinput::placeholder{color:#333}
    .fstat{color:#444}
    .fstat span{color:#888}
    .saved-msg{color:#444}
    .hint{color:#333}
    .footer{border-top-color:#222}
  }
</style>
</head>
<body>
<div class="wl">
  <div class="wl-title">work log</div>
  <div class="wl-sub">09:00 — 18:00 · 30 min intervals</div>
  <div class="date-row">
    <button class="nbtn" id="prev">←</button>
    <div class="date-label" id="dlabel"></div>
    <button class="nbtn today" id="tod">today</button>
    <button class="nbtn" id="next">→</button>
  </div>
  <div id="grid"></div>
  <div class="footer">
    <div>
      <div class="fstat" id="fstat"></div>
      <div class="hint">enter to save · esc to cancel · shift+enter for new line</div>
    </div>
    <div class="saved-msg" id="smsg">↳ saved</div>
  </div>
</div>

<script>
const TIMES=[];
for(let h=9;h<18;h++){TIMES.push(`${String(h).padStart(2,'0')}:00`);TIMES.push(`${String(h).padStart(2,'0')}:30`);}
const MONTHS=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
const DAYS=['sun','mon','tue','wed','thu','fri','sat'];

let cur=new Date();cur.setHours(0,0,0,0);
let dayData={};
let stimer=null;

function dk(d){return d.toISOString().slice(0,10)}
function fmt(d){return `${d.getFullYear()} ${MONTHS[d.getMonth()]} ${String(d.getDate()).padStart(2,'0')} · ${DAYS[d.getDay()]}`}

function load(){
  const key='wl:'+dk(cur);
  try{const r=localStorage.getItem(key);dayData=r?JSON.parse(r):{};}catch{dayData={};}
  render();
}
function save(){
  try{localStorage.setItem('wl:'+dk(cur),JSON.stringify(dayData));}catch{}
  const m=document.getElementById('smsg');
  m.classList.add('on');
  clearTimeout(stimer);
  stimer=setTimeout(()=>m.classList.remove('on'),1800);
}

function render(){
  document.getElementById('dlabel').textContent=fmt(cur);
  const g=document.getElementById('grid');
  g.innerHTML='';
  TIMES.forEach(t=>{
    const isHour=t.endsWith(':00');
    const row=document.createElement('div');
    row.className='slot'+(isHour?' hour':'');
    const lbl=document.createElement('div');
    lbl.className='tlabel';lbl.textContent=t;
    const cell=document.createElement('div');
    const val=dayData[t]||'';
    cell.className='scell'+(val?' filled':'');
    const txt=document.createElement('div');
    txt.className='stext'+(val?'':' empty');
    txt.textContent=val||'—';
    cell.appendChild(txt);
    cell.addEventListener('click',()=>activate(t,cell,txt));
    row.appendChild(lbl);row.appendChild(cell);g.appendChild(row);
  });
  updateStat();
}

function activate(t,cell,txt){
  if(cell.querySelector('textarea'))return;
  cell.classList.add('active');
  const ta=document.createElement('textarea');
  ta.className='sinput';ta.rows=1;
  ta.value=dayData[t]||'';ta.placeholder='업무 내용 입력...';
  cell.replaceChild(ta,txt);
  ta.focus();ta.select();
  ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});

  function done(){
    const v=ta.value.trim();
    dayData[t]=v;
    const nt=document.createElement('div');
    nt.className='stext'+(v?'':' empty');
    nt.textContent=v||'—';
    cell.replaceChild(nt,ta);
    cell.classList.remove('active');
    cell.classList.toggle('filled',!!v);
    updateStat();save();
    cell.addEventListener('click',()=>activate(t,cell,nt));
  }
  function cancel(){
    const v=dayData[t]||'';
    const nt=document.createElement('div');
    nt.className='stext'+(v?'':' empty');
    nt.textContent=v||'—';
    cell.replaceChild(ta,ta);cell.replaceChild(nt,ta);
    cell.classList.remove('active');
    cell.addEventListener('click',()=>activate(t,cell,nt));
  }
  ta.addEventListener('blur',done);
  ta.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();ta.blur();}
    if(e.key==='Escape'){e.preventDefault();ta.removeEventListener('blur',done);cancel();}
  });
}

function updateStat(){
  const filled=Object.values(dayData).filter(v=>v&&v.trim()).length;
  const total=TIMES.length;
  const pct=Math.round(filled/total*100);
  document.getElementById('fstat').innerHTML=`<span>${filled}</span> / ${total} slots · <span>${pct}%</span> logged`;
}

document.getElementById('prev').addEventListener('click',()=>{cur=new Date(cur.getTime()-86400000);load();});
document.getElementById('next').addEventListener('click',()=>{cur=new Date(cur.getTime()+86400000);load();});
document.getElementById('tod').addEventListener('click',()=>{cur=new Date();cur.setHours(0,0,0,0);load();});

load();
</script>
</body>
</html>
