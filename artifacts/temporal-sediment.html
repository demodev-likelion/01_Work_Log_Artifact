<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporal Sediment — Generative Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f0ede6 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }
        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }
        .sidebar {
            width: 300px;
            flex-shrink: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20,20,19,0.1);
            overflow-y: auto;
            overflow-x: hidden;
            height: fit-content;
            position: sticky;
            top: 20px;
        }
        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 22px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 6px;
        }
        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 12px;
            margin-bottom: 28px;
            line-height: 1.5;
        }
        .control-section { margin-bottom: 28px; }
        .control-section h3 {
            font-size: 13px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
            font-weight: bold;
        }
        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 10px 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            margin-bottom: 10px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
            color: var(--anthropic-dark);
        }
        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217,119,87,0.12);
            background: white;
        }
        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 7px;
            margin-bottom: 7px;
        }
        .control-group { margin-bottom: 18px; }
        .control-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 7px;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            background: #c86641;
        }
        .slider-container input[type="range"]::-moz-range-thumb {
            width: 15px;
            height: 15px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }
        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: var(--anthropic-mid-gray);
            min-width: 44px;
            text-align: right;
        }
        .color-group { margin-bottom: 13px; }
        .color-group label {
            display: block;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 5px;
        }
        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .color-picker-container input[type="color"] {
            width: 30px;
            height: 30px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }
        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: var(--anthropic-mid-gray);
        }
        .button {
            width: 100%;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--anthropic-dark);
            color: white;
            margin-bottom: 8px;
        }
        .button:hover { background: #2a2a28; transform: translateY(-1px); }
        .button.secondary {
            background: var(--anthropic-light-gray);
            color: var(--anthropic-dark);
        }
        .button.secondary:hover { background: #d5d3c8; }
        .button.accent {
            background: var(--anthropic-orange);
            color: white;
        }
        .button.accent:hover { background: #c86641; }
        .divider {
            border: none;
            border-top: 1px solid var(--anthropic-light-gray);
            margin: 20px 0;
        }
        .canvas-area {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }
        #canvas-container {
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(20,20,19,0.18);
        }
        #canvas-container canvas {
            display: block;
        }
        .status-badge {
            font-size: 11px;
            color: var(--anthropic-mid-gray);
            text-align: center;
            padding: 6px;
            background: var(--anthropic-light);
            border-radius: 6px;
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Temporal Sediment</h1>
            <p class="subtitle">Geological time compressed into algorithmic strata — accumulation as composition.</p>

            <!-- Seed Section -->
            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" class="seed-input" id="seed-input" value="12345" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button accent" onclick="randomSeedAndUpdate()">Random Seed</button>
            </div>

            <hr class="divider">

            <!-- Parameters Section -->
            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Particle Count</label>
                    <div class="slider-container">
                        <input type="range" id="particleCount" min="500" max="6000" step="250" value="3000"
                               oninput="updateParam('particleCount', +this.value); reinitialize();">
                        <span class="value-display" id="particleCount-value">3000</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Macro Drift Scale</label>
                    <div class="slider-container">
                        <input type="range" id="macroScale" min="0.001" max="0.012" step="0.001" value="0.004"
                               oninput="updateParam('macroScale', +this.value); reinitialize();">
                        <span class="value-display" id="macroScale-value">0.004</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Micro Turbulence</label>
                    <div class="slider-container">
                        <input type="range" id="microScale" min="0.01" max="0.08" step="0.005" value="0.03"
                               oninput="updateParam('microScale', +this.value); reinitialize();">
                        <span class="value-display" id="microScale-value">0.030</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Drift Speed</label>
                    <div class="slider-container">
                        <input type="range" id="speed" min="0.2" max="2.5" step="0.1" value="0.9"
                               oninput="updateParam('speed', +this.value);">
                        <span class="value-display" id="speed-value">0.9</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Sediment Opacity</label>
                    <div class="slider-container">
                        <input type="range" id="trailOpacity" min="5" max="60" step="1" value="18"
                               oninput="updateParam('trailOpacity', +this.value);">
                        <span class="value-display" id="trailOpacity-value">18</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Strata Thickness</label>
                    <div class="slider-container">
                        <input type="range" id="lineWeight" min="0.3" max="3.0" step="0.1" value="1.1"
                               oninput="updateParam('lineWeight', +this.value);">
                        <span class="value-display" id="lineWeight-value">1.1</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Attractor Strength</label>
                    <div class="slider-container">
                        <input type="range" id="attractorStr" min="0.0" max="1.0" step="0.05" value="0.35"
                               oninput="updateParam('attractorStr', +this.value); reinitialize();">
                        <span class="value-display" id="attractorStr-value">0.35</span>
                    </div>
                </div>
            </div>

            <hr class="divider">

            <!-- Colors Section -->
            <div class="control-section">
                <h3>Palette</h3>
                <div class="color-group">
                    <label>Ochre Vein</label>
                    <div class="color-picker-container">
                        <input type="color" id="col1" value="#c97a3a" onchange="updateColor(0, this.value)">
                        <span class="color-value" id="col1-value">#c97a3a</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Slate Bed</label>
                    <div class="color-picker-container">
                        <input type="color" id="col2" value="#5a7a8e" onchange="updateColor(1, this.value)">
                        <span class="color-value" id="col2-value">#5a7a8e</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Bone Dust</label>
                    <div class="color-picker-container">
                        <input type="color" id="col3" value="#d4c9a8" onchange="updateColor(2, this.value)">
                        <span class="color-value" id="col3-value">#d4c9a8</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Deep Loam</label>
                    <div class="color-picker-container">
                        <input type="color" id="col4" value="#3d2b1a" onchange="updateColor(3, this.value)">
                        <span class="color-value" id="col4-value">#3d2b1a</span>
                    </div>
                </div>
            </div>

            <hr class="divider">

            <!-- Actions Section -->
            <div class="control-section">
                <h3>Actions</h3>
                <div id="status" class="status-badge">Accreting strata...</div>
                <button class="button accent" onclick="reinitialize()">Regenerate</button>
                <button class="button secondary" onclick="resetParameters()">Reset Defaults</button>
                <button class="button" onclick="downloadCanvas()">Download PNG</button>
            </div>
        </div>

        <!-- Canvas -->
        <div class="canvas-area">
            <div id="canvas-container"></div>
        </div>
    </div>

    <script>
    // ═══════════════════════════════════════════════════════════════════
    // TEMPORAL SEDIMENT — Parameters
    // ═══════════════════════════════════════════════════════════════════

    let params = {
        seed: 12345,
        particleCount: 3000,
        macroScale: 0.004,
        microScale: 0.03,
        speed: 0.9,
        trailOpacity: 18,
        lineWeight: 1.1,
        attractorStr: 0.35,
        palette: ['#c97a3a', '#5a7a8e', '#d4c9a8', '#3d2b1a']
    };

    const defaultParams = JSON.parse(JSON.stringify(params));

    // ═══════════════════════════════════════════════════════════════════
    // ALGORITHM STATE
    // ═══════════════════════════════════════════════════════════════════

    let particles = [];
    let attractors = [];
    let frameCount_ = 0;
    let maxFrames = 800;
    let p5Instance;

    // Hex → [r,g,b]
    function hexToRGB(hex) {
        const r = parseInt(hex.slice(1,3),16);
        const g = parseInt(hex.slice(3,5),16);
        const b = parseInt(hex.slice(5,7),16);
        return [r,g,b];
    }

    // ═══════════════════════════════════════════════════════════════════
    // P5 SKETCH
    // ═══════════════════════════════════════════════════════════════════

    const sketch = function(p) {

        p.setup = function() {
            let cnv = p.createCanvas(900, 900);
            cnv.parent('canvas-container');
            p.pixelDensity(1);
            initializeSystem(p);
        };

        p.draw = function() {
            if (frameCount_ >= maxFrames) {
                p.noLoop();
                document.getElementById('status').textContent = 'Sediment settled — ' + frameCount_ + ' layers';
                return;
            }

            // Deposit particles
            p.noStroke();
            for (let i = 0; i < particles.length; i++) {
                const pt = particles[i];
                pt.update(p);
                pt.draw(p);
            }

            frameCount_++;
            if (frameCount_ % 50 === 0) {
                document.getElementById('status').textContent =
                    'Layer ' + frameCount_ + ' / ' + maxFrames;
            }
        };
    };

    // ═══════════════════════════════════════════════════════════════════
    // SYSTEM INITIALIZATION
    // ═══════════════════════════════════════════════════════════════════

    function initializeSystem(p) {
        if (!p) { if (p5Instance) p = p5Instance._pInst || p5Instance; }
        frameCount_ = 0;

        p.randomSeed(params.seed);
        p.noiseSeed(params.seed);

        // Create geological attractor basins from seed
        attractors = [];
        const numAttractors = 3 + Math.floor(p.random(3));
        for (let i = 0; i < numAttractors; i++) {
            attractors.push({
                x: p.random(p.width * 0.15, p.width * 0.85),
                y: p.random(p.height * 0.15, p.height * 0.85),
                strength: p.random(0.5, 1.5),
                radius: p.random(80, 220)
            });
        }

        // Background: warm bone-white stratum base
        const bg = hexToRGB('#f7f3ea');
        p.background(bg[0], bg[1], bg[2]);

        // Very subtle base texture (fine grain)
        p.loadPixels();
        for (let i = 0; i < p.width * p.height * 4; i += 4) {
            const grain = p.random(-6, 6);
            p.pixels[i]   = Math.min(255, Math.max(0, p.pixels[i]   + grain));
            p.pixels[i+1] = Math.min(255, Math.max(0, p.pixels[i+1] + grain * 0.8));
            p.pixels[i+2] = Math.min(255, Math.max(0, p.pixels[i+2] + grain * 0.6));
        }
        p.updatePixels();

        // Spawn particles across canvas
        particles = [];
        for (let i = 0; i < params.particleCount; i++) {
            particles.push(new Particle(p));
        }

        p.loop();
        document.getElementById('status').textContent = 'Accreting strata...';
    }

    // ═══════════════════════════════════════════════════════════════════
    // PARTICLE CLASS
    // ═══════════════════════════════════════════════════════════════════

    class Particle {
        constructor(p) {
            this.p = p;
            this.reset();
            // Assign a color from palette weighted by y position (geological depth)
            this.colorIdx = Math.floor(p.random(params.palette.length));
        }

        reset() {
            const p = this.p;
            // Spawn from edges or random interior
            if (p.random() < 0.4) {
                const edge = Math.floor(p.random(4));
                if (edge === 0) { this.x = p.random(p.width); this.y = 0; }
                else if (edge === 1) { this.x = p.width; this.y = p.random(p.height); }
                else if (edge === 2) { this.x = p.random(p.width); this.y = p.height; }
                else { this.x = 0; this.y = p.random(p.height); }
            } else {
                this.x = p.random(p.width);
                this.y = p.random(p.height);
            }
            this.age = 0;
            this.maxAge = 60 + p.random(120);
            this.stepSize = params.speed * (0.7 + p.random(0.6));
            this.colorIdx = Math.floor(p.random(params.palette.length));
        }

        update(p) {
            // Dual-frequency noise field angle
            const nx = this.x * params.macroScale;
            const ny = this.y * params.macroScale;
            const mx = this.x * params.microScale;
            const my = this.y * params.microScale;

            const macroAngle = p.noise(nx, ny, 0.1) * p.TWO_PI * 2;
            const microAngle = p.noise(mx, my, 5.7) * p.PI * 0.5;

            // Blend macro geological drift with micro turbulence
            const angle = macroAngle * 0.75 + microAngle * 0.25;

            // Attractor influence — pulls toward basin centers
            let ax = 0, ay = 0;
            for (const att of attractors) {
                const dx = att.x - this.x;
                const dy = att.y - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < att.radius && dist > 1) {
                    const force = (1 - dist / att.radius) * att.strength * params.attractorStr;
                    ax += (dx / dist) * force;
                    ay += (dy / dist) * force;
                }
            }

            const vx = Math.cos(angle) * this.stepSize + ax;
            const vy = Math.sin(angle) * this.stepSize + ay;

            this.prevX = this.x;
            this.prevY = this.y;
            this.x += vx;
            this.y += vy;
            this.age++;

            if (this.age > this.maxAge ||
                this.x < -5 || this.x > p.width + 5 ||
                this.y < -5 || this.y > p.height + 5) {
                this.reset();
            }
        }

        draw(p) {
            const col = hexToRGB(params.palette[this.colorIdx]);
            // Fade in/out by age
            const lifeFrac = this.age / this.maxAge;
            const fadeEdge = Math.min(lifeFrac * 5, (1 - lifeFrac) * 5, 1.0);
            // Depth: particles near attractors get darker/richer
            let depthMod = 1.0;
            for (const att of attractors) {
                const dx = att.x - this.x;
                const dy = att.y - this.y;
                const d = Math.sqrt(dx*dx + dy*dy);
                if (d < att.radius) {
                    depthMod = Math.max(depthMod, 1.0 + (1 - d/att.radius) * 1.2);
                }
            }

            const alpha = Math.floor(params.trailOpacity * fadeEdge * Math.min(depthMod, 1.8));
            p.stroke(col[0], col[1], col[2], alpha);
            p.strokeWeight(params.lineWeight * (0.5 + depthMod * 0.5));
            p.line(this.prevX, this.prevY, this.x, this.y);
        }
    }

    // ═══════════════════════════════════════════════════════════════════
    // UI HANDLERS
    // ═══════════════════════════════════════════════════════════════════

    function updateParam(name, value) {
        params[name] = value;
        document.getElementById(name + '-value').textContent =
            (value % 1 !== 0) ? value.toFixed(3) : value;
    }

    function updateColor(idx, hex) {
        params.palette[idx] = hex;
        const ids = ['col1','col2','col3','col4'];
        document.getElementById(ids[idx] + '-value').textContent = hex;
    }

    function reinitialize() {
        if (p5Instance) {
            initializeSystem(p5Instance);
        }
    }

    // Seed navigation
    function updateSeedDisplay() {
        document.getElementById('seed-input').value = params.seed;
    }
    function updateSeed() {
        const v = parseInt(document.getElementById('seed-input').value);
        if (v > 0) { params.seed = v; reinitialize(); }
        else updateSeedDisplay();
    }
    function previousSeed() {
        params.seed = Math.max(1, params.seed - 1);
        updateSeedDisplay(); reinitialize();
    }
    function nextSeed() {
        params.seed = params.seed + 1;
        updateSeedDisplay(); reinitialize();
    }
    function randomSeedAndUpdate() {
        params.seed = Math.floor(Math.random() * 999999) + 1;
        updateSeedDisplay(); reinitialize();
    }

    function resetParameters() {
        params = JSON.parse(JSON.stringify(defaultParams));
        // Sync UI
        const sliders = ['particleCount','macroScale','microScale','speed','trailOpacity','lineWeight','attractorStr'];
        sliders.forEach(id => {
            document.getElementById(id).value = params[id];
            const val = params[id];
            document.getElementById(id+'-value').textContent =
                (val % 1 !== 0) ? val.toFixed(3) : val;
        });
        const colorIds = ['col1','col2','col3','col4'];
        colorIds.forEach((id, i) => {
            document.getElementById(id).value = params.palette[i];
            document.getElementById(id+'-value').textContent = params.palette[i];
        });
        updateSeedDisplay();
        reinitialize();
    }

    function downloadCanvas() {
        if (p5Instance) {
            p5Instance.saveCanvas('temporal-sediment-' + params.seed, 'png');
        }
    }

    // ═══════════════════════════════════════════════════════════════════
    // BOOT
    // ═══════════════════════════════════════════════════════════════════

    window.addEventListener('load', function() {
        p5Instance = new p5(sketch, document.getElementById('canvas-container'));
        // p5Instance won't expose the actual p5 context directly — we need a workaround
        // We'll store reference inside sketch
        const origSketch = sketch;
        updateSeedDisplay();
    });

    // Patch: expose the p5 internal p object for reinitialize calls
    const sketch2 = function(p) {
        p5Instance = p; // store the actual p5 instance
        p.setup = function() {
            let cnv = p.createCanvas(900, 900);
            cnv.parent('canvas-container');
            p.pixelDensity(1);
            initializeSystem(p);
        };
        p.draw = function() {
            if (frameCount_ >= maxFrames) {
                p.noLoop();
                document.getElementById('status').textContent = 'Settled — ' + frameCount_ + ' layers deposited';
                return;
            }
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(p);
                particles[i].draw(p);
            }
            frameCount_++;
            if (frameCount_ % 100 === 0) {
                document.getElementById('status').textContent =
                    'Strata ' + frameCount_ + ' / ' + maxFrames + ' deposited';
            }
        };
    };
    </script>

    <!-- Override the load to use sketch2 -->
    <script>
    window.addEventListener('DOMContentLoaded', function() {
        document.getElementById('canvas-container').innerHTML = '';
        new p5(sketch2);
        updateSeedDisplay();
    });
    </script>
</body>
</html>
